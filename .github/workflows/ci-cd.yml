# CI/CD: run tests on every push/PR; deploy to Render only on main after tests pass.

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          check-latest: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest tests/ -v
        env:
          WANDB_MODE: disabled   # prevent W&B network calls in CI


  deploy:
    name: Deploy to Render
    needs: test
    runs-on: ubuntu-latest

    # PRs run tests but never deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # RENDER_DEPLOY_HOOK_URL is stored as a GitHub Actions secret
      - name: Trigger Render Deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | cat
          echo "Deploy triggered successfully!"
